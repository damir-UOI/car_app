{% extends "base.html" %}

{% block content %}

<h1>Runs</h1>

<table>

<tr>

<th>ID</th>
<th>Driver</th>
<th>Course</th>
<th>Time</th>
<th>Cones</th>

</tr>

{% for run in runs %}

<tr>

<td>{{ run[0] }}</td>
<td>{{ run[1] }}</td>
<td>{{ run[2] }}</td>
<td>{{ run[3] }}</td>
<td>{{ run[4] }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
